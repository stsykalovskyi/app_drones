{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:640px">
    <h2 style="margin:0 0 1.5rem;font-size:1.25rem;font-weight:700">{{ title }}</h2>
    <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label">{{ field.label }}{% if field.field.required %} <span style="color:var(--accent)">*</span>{% endif %}</label>
            {{ field }}
            {% if field.errors %}<div class="form-error">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div style="display:flex;gap:.75rem;margin-top:1.5rem">
            <button type="submit" class="btn btn-primary">Зберегти звіт</button>
            <a href="{% url 'pilots:strike_report_list' %}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>
</div>
{% endblock %}
