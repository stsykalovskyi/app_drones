name: Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server (SSH key file)
    environment: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key + known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # write key safely, normalize CRLF
          umask 077
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # trust host key (port 2244)
          ssh-keyscan -H -p 2244 85.121.4.216 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -p 2244 -o BatchMode=yes root@85.121.4.216 << 'EOF'
            set -euo pipefail
            cd /root/MyProjects/python/app_drones

            # Update codebase
            git fetch --all --prune
            git checkout master
            git reset --hard origin/master

            # Apply database migrations
            docker exec app_drones /bin/bash -c "source /app/.venv/bin/activate && python /app/manage.py migrate --no-input"

            # Find all fixtures and apply them
            FIXTURE_NAMES=$(find . -path '*/fixtures/*.json' -exec basename {} .json \; | tr '\n' ' ')
            if [ -n "$FIXTURE_NAMES" ]; then
              docker exec app_drones /bin/bash -c "source /app/.venv/bin/activate && python /app/manage.py loaddata $FIXTURE_NAMES"
            fi

            # Restart application container
            docker container restart app_drones

            # Restart Telegram bot in a detached screen session
            screen -S bot -X quit || true
            screen -dmS bot bash -c "
              cd /root/MyProjects/python/app_drones
              source .venv/bin/activate
              python manage.py run_telegram_bot >> /var/log/tgbot.log 2>&1
            "

            # Start WhatsApp sender only if not already running
            if screen -list | grep -q "wasender"; then
              echo "wasender already running — skipping start"
            else
              screen -dmS wasender bash -c "
                cd /root/MyProjects/python/app_drones
                source .venv/bin/activate
                python manage.py run_whatsapp_sender >> /var/log/wasender.log 2>&1
              "
              echo "wasender started"
            fi

          EOF
